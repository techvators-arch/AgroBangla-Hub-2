kind = "web"
previewPath = "/"
title = "AgroBangla - কৃষি সেবা প্ল্যাটফর্ম"
version = "1.0.0"
id = "artifacts/agrobangla"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22025

[services.development]
run = "pnpm --filter @workspace/agrobangla run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/agrobangla", "run", "build" ]
publicDir = "artifacts/agrobangla/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22025"
BASE_PATH = "/"
